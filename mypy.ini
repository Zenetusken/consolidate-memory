# mypy config — a DEV-ONLY maintainer tool, never a runtime dependency.
#
# Lives at the repo ROOT, OUTSIDE plugins/consolidate-memory/, so it is NEVER bundled
# into the published plugin (the plugin = plugins/consolidate-memory/ only). It exists
# to catch cycle-record CONTRACT drift at dev time: the TypedDicts in memory_status.py
# make the producer-side record shape (the seed_record/_demo_record literals) statically
# checked, so a renamed/extra/wrong-typed key is a build error, not a downstream surprise.
#
# Deliberately PRAGMATIC, not --strict: the goal is to catch contract drift, not to fully
# type a stdlib-only zero-dependency codebase. So we do NOT set disallow_untyped_defs and
# we do NOT disable any error code that would gut the TypedDict checks (typeddict-item /
# typeddict-unknown-key stay ON — they ARE the contract).
#
# Run (dev-only):  mypy --config-file mypy.ini

[mypy]
# Both plugins' scripts are dev-checked. The dream-beta-tester's beta_checks.py re-implements bits of
# the skill's contract (resolve_wikilink/valid_link_targets), so it earns the same drift guard — a
# tgt-type drift slipped in v0.1.35 precisely because dbt was uncovered (caught + added in v0.1.36).
# fixtures/ added in v0.1.40 (M3): make_fixture.py is a 4th slug_for reimplementation that DRIFTED out of
# coverage here ([/_] vs the others' generalization) — checking it closes the blind spot, not just the symptom.
files = plugins/consolidate-memory/scripts, plugins/dream-beta-tester/scripts, plugins/dream-beta-tester/fixtures, tests
warn_redundant_casts = True
warn_unused_ignores = True
